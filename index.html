<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogwarts Legacy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
    <link rel="shortcut icon" href="https://i.pinimg.com/originals/c0/a6/b6/c0a6b6ac529dac6c19d524358851cce4.jpg" type="image/x-icon">
  </head>
  <body>
    <main class="main-container">
      <header>
        <h1>Harry Potter Student API</h1>
        <p>Summon Hogwarts Students with a Single Call</p>
      </header>
      <div class="container">
        <div class="user-input">
          <input
            type="search"
            id="search-user"
            placeholder="Search something.."
            autocomplete="off"
          />
        </div>
        <div class="show-user">
          <!-- <span id="title">Students:</span> -->
          <span id="content"> Search your favorite student.</span>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
